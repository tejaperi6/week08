# .github/workflows/frontend-cd.yml
name: CD - Deploy Frontend to AKS

on:
  workflow_dispatch:
    inputs:
      product_api_ip:
        description: "External URL of Product API (e.g., http://X.X.X.X:8001)"
        required: true
      order_api_ip:
        description: "External URL of Order API (e.g., http://Y.Y.Y.Y:8002)"
        required: true

permissions:
  contents: read
  id-token: write

env:
  REGISTRY_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY }}        # e.g. tejaperiwk08acr01.azurecr.io
  AKS_RG: ${{ secrets.RESOURCE_GROUP }}                           # sit722-wk08-teja
  AKS_NAME: ${{ secrets.AKS_CLUSTER }}                            # teja-wk08-aks

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    #I environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login to Azure with the SP JSON you stored in AZURE_CREDENTIALS
      - name: Azure Login (OIDC or creds JSON)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ACR login – needs the REGISTRY NAME, not the login server.
      - name: Login to Azure Container Registry
        shell: bash
        run: |
          REGISTRY_NAME="${REGISTRY_SERVER%%.azurecr.io}"
          echo "Logging into ACR: $REGISTRY_NAME ($REGISTRY_SERVER)"
          az acr login --name "$REGISTRY_NAME"

      # Inject the backend URLs into your frontend. Make sure main.js has these placeholders.
      # If your file uses "__PRODUCT_API__" / "__ORDER_API__", update the sed patterns accordingly.
      - name: Inject API URLs into frontend/main.js
        run: |
          sed -i "s|_PRODUCT_API_URL_|${{ inputs.product_api_ip }}|g" frontend/main.js || true
          sed -i "s|_ORDER_API_URL_|${{ inputs.order_api_ip }}|g"   frontend/main.js || true
          sed -n '1,120p' frontend/main.js

      # Build and push the frontend image
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ env.REGISTRY_SERVER }}/frontend:latest ./frontend
          docker push ${{ env.REGISTRY_SERVER }}/frontend:latest

      # Set AKS context
      - name: Set Kubernetes context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_NAME }}

      # Deploy the frontend. Your k8s/frontend.yaml must use the ACR image and an imagePullSecret (acr-pull).
      - name: Deploy Frontend to AKS
        run: |
          kubectl apply -f k8s/frontend.yaml
          kubectl rollout status deploy/frontend-deploy --timeout=180s
          kubectl get svc frontend-service -o wide

      - name: Logout
        run: az logout
